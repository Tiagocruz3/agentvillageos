<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AgentVerse OS</title>
<style>
  :root{ --bg:#0f1117; --panel:rgba(18,22,32,.9); --panel2:rgba(32,38,52,.94);
    --line:rgba(255,255,255,.12); --txt:#eef2f8; --muted:#9aa6bd; --accent:#5ab0ff; --good:#7fd07f; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-user-select:none;user-select:none}
  canvas{display:block;position:fixed;inset:0}
  #dev{position:fixed;top:6px;left:50%;transform:translateX(-50%);color:#9be37a;font:12px monospace;display:none;z-index:60}

  #hud{position:fixed;top:0;left:0;right:0;display:flex;gap:8px;padding:10px 12px;z-index:20;pointer-events:none}
  .stat{display:flex;align-items:center;gap:7px;background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-weight:700;font-size:14px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .stat small{color:var(--muted);font-weight:600;font-size:11px}
  .brand{font-weight:800}.brand .dot{color:var(--accent)} .spacer{flex:1}

  #hint{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:18;max-width:90vw;text-align:center;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 16px;font-size:13px;color:var(--muted);
    backdrop-filter:blur(8px);box-shadow:0 6px 18px rgba(0,0,0,.25)}
  #hint.hide{display:none}
  #placebar{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:25;display:none;cursor:pointer;
    background:linear-gradient(90deg,rgba(90,176,255,.28),rgba(127,208,127,.28));border:1px solid var(--line);
    border-radius:999px;padding:10px 18px;font-size:13.5px;font-weight:700;backdrop-filter:blur(8px);box-shadow:0 8px 22px rgba(0,0,0,.3)}
  #placebar.show{display:block}

  /* construction dock (persistent) */
  #dock{position:fixed;left:50%;bottom:calc(10px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:30;
    display:flex;align-items:flex-end;gap:6px;padding:9px 12px;background:var(--panel);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:22px;box-shadow:0 14px 40px rgba(0,0,0,.45);max-width:96vw;overflow-x:auto}
  .dockitem{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;min-width:58px;transition:transform .12s}
  .dockitem:hover{transform:translateY(-5px)} .dockitem:active{transform:translateY(-1px)}
  .dockicon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;
    background:var(--panel2);box-shadow:inset 0 0 0 1px rgba(255,255,255,.10),0 5px 14px rgba(0,0,0,.3)}
  .dockitem small{font-size:10px;color:var(--muted);font-weight:700;white-space:nowrap}
  .docksep{width:1px;align-self:stretch;background:var(--line);margin:4px 2px}

  /* modal */
  #modal{position:fixed;inset:0;z-index:40;display:none;align-items:flex-end;justify-content:center;background:rgba(5,8,14,.55);backdrop-filter:blur(3px)}
  #modal.open{display:flex}
  .sheet{background:var(--panel);border:1px solid var(--line);border-radius:22px 22px 0 0;width:480px;max-width:100vw;max-height:88vh;display:flex;flex-direction:column;padding:16px;gap:12px;box-shadow:0 -20px 60px rgba(0,0,0,.5)}
  .sheet.big{height:86vh}
  @media(min-width:560px){#modal{align-items:center}.sheet{border-radius:22px}.sheet.big{height:640px}}
  .phead{display:flex;align-items:center;gap:11px}
  .phead h2{margin:0;font-size:19px;flex:1;line-height:1.15}
  .x{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:10px;width:34px;height:34px;font-size:15px;cursor:pointer;flex:none}
  .muted{color:var(--muted);font-size:12.5px;line-height:1.5}
  .sub{margin:10px 0 4px;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:800}
  .scroll{overflow-y:auto;display:flex;flex-direction:column;gap:9px;flex:1;-webkit-overflow-scrolling:touch}
  .pill{border-radius:999px;padding:3px 10px;font-size:11px;font-weight:800;color:#fff;background:var(--panel2)}
  .pill.ok{background:rgba(127,208,127,.22);color:#bff0bf} .pill.muted{color:var(--muted)}

  .card{display:flex;gap:11px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:11px;text-align:left}
  .card .grow{flex:1;min-width:0}.card b{font-size:14.5px}
  .libitem{display:flex;gap:11px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:10px;cursor:pointer;color:var(--txt);text-align:left;width:100%}
  .libitem:hover{border-color:var(--accent)} .lib{gap:9px}
  .libicon{width:46px;height:46px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--panel2)}
  .libicon.sm{width:36px;height:36px;font-size:18px}
  .bavatar{width:50px;height:50px;border-radius:14px;flex:none;display:flex;align-items:center;justify-content:center;font-size:26px;background:#283149;border:1px solid var(--line)}

  .tabbar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}.tabbar.wrap{flex-wrap:wrap;overflow:visible}
  .tab{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:8px 12px;font-weight:700;font-size:12.5px;cursor:pointer;white-space:nowrap}
  .tab.on{background:var(--accent);color:#06233f;border-color:transparent}
  .tabbody{margin-top:4px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px}

  label.field{display:flex;flex-direction:column;gap:6px;font-size:12.5px;color:var(--muted);font-weight:700}
  input,select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:11px;padding:11px;font-size:15px;font-family:inherit;width:100%}
  textarea{resize:vertical}
  .form{display:flex;flex-direction:column;gap:11px}
  .btn{border:none;border-radius:12px;padding:11px 14px;font-weight:800;font-size:14px;cursor:pointer}
  .btn.primary{background:var(--accent);color:#06233f}.btn.full{width:100%}
  .btn.ghost{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .btn.danger{background:rgba(255,99,99,.16);color:#ffb4b4;border:1px solid rgba(255,99,99,.3)}
  .btn:active{transform:translateY(1px)} .btn[disabled]{opacity:.5}
  .frow{display:flex;gap:9px;justify-content:flex-end}.frow .primary,.frow .danger{flex:1}
  .help{margin:0;padding-left:20px;line-height:1.6;font-size:14px;display:flex;flex-direction:column;gap:7px}

  /* chat */
  .chat{display:flex;flex-direction:column;height:74vh;max-height:74vh}
  @media(min-width:560px){.chat{height:540px}}
  .msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:6px 2px}
  .bubble{max-width:84%;padding:10px 13px;border-radius:16px;font-size:14.5px;line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
  .bubble.user{align-self:flex-end;background:var(--accent);color:#06233f;border-bottom-right-radius:5px}
  .bubble.bot{align-self:flex-start;background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:5px}
  .bubble.note{align-self:center;background:transparent;color:var(--muted);font-size:11.5px}
  .composer{display:flex;gap:8px;align-items:flex-end;padding-top:6px}.composer textarea{max-height:120px;min-height:46px}
  .typing{align-self:flex-start;color:var(--muted);font-size:13px;padding:4px 8px}

  /* quick (context) menu */
  #ctx{position:fixed;z-index:50;display:none;flex-direction:column;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:6px;min-width:150px;box-shadow:0 14px 40px rgba(0,0,0,.5);backdrop-filter:blur(12px)}
  #ctx.show{display:flex}
  #ctx button{background:transparent;border:none;color:var(--txt);text-align:left;padding:10px 12px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer}
  #ctx button:hover{background:var(--panel2)} #ctx button.danger{color:#ffb4b4}

  #toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);z-index:55;background:rgba(20,24,34,.96);
    border:1px solid var(--line);color:#fff;border-radius:12px;padding:11px 18px;font-weight:700;font-size:13.5px;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="dev"></div>

<div id="hud">
  <div class="stat brand">Agent<span class="dot">Verse</span> OS</div>
  <div class="spacer"></div>
  <div class="stat"><span>🪙</span><span id="h_coins">0</span></div>
  <div class="stat"><span>🏢</span><small>Bld</small><span id="h_b">0</span></div>
  <div class="stat"><span>🤖</span><small>Agents</small><span id="h_a">0</span></div>
</div>

<div id="hint"></div>
<div id="placebar"></div>
<div id="dock"></div>
<div id="ctx"></div>
<div id="modal"></div>
<div id="toast"></div>

<script type="module" src="./game.js"></script>
</body>
</html>
